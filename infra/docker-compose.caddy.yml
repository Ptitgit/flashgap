# Optionnel — dev local / VPS dédié sans nginx sur l'hôte.
# Usage : docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./scripts/render-caddyfile.sh:/render-caddyfile.sh:ro
      - ./scripts/caddy-entrypoint.sh:/caddy-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ['/bin/sh', '/caddy-entrypoint.sh']
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
