# Snippet nginx — webhook GitHub deploy (à inclure dans le server HTTPS otrom.fr).
# Le listener écoute sur 127.0.0.1:9876 (github-deploy-webhook-server.py).
#
#   sudo cp infra/scripts/nginx-flashgap-deploy-hook.conf /etc/nginx/snippets/flashgap-deploy-hook.conf
#   # Dans /etc/nginx/sites-available/otrom.fr, dans le bloc server :443, ajouter :
#   #   include snippets/flashgap-deploy-hook.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# URL publique (webhook GitHub) : https://otrom.fr/flashgap-deploy-hook
# Content type : application/json — Event : push — Secret : FLASHGAP_GITHUB_WEBHOOK_SECRET

location = /flashgap-deploy-hook {
    proxy_pass http://127.0.0.1:9876/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-GitHub-Event $http_x_github_event;
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    proxy_read_timeout 300s;
}
