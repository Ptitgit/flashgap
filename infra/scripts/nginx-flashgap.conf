# Snippet nginx — à inclure dans le server HTTPS otrom.fr (ou équivalent).
# L'API Flashgap écoute sur 127.0.0.1:3010 (deploy.sh par défaut).
#
#   sudo cp infra/scripts/nginx-flashgap.conf /etc/nginx/snippets/flashgap.conf
#   # Dans /etc/nginx/sites-available/otrom.fr, dans le bloc server :443, ajouter :
#   #   include snippets/flashgap.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# URL publique : https://otrom.fr/flashgap/health

location /flashgap/ {
    proxy_pass http://127.0.0.1:3010/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
